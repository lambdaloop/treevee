# Example config.toml for treevee
# Copy this file to config.toml and adjust as needed.
# CLI args take precedence over config.toml values, which take precedence
# over the defaults listed here.
#
# Note: LLM model selection is NOT configured here. Use:
#   --model CLI flag, or
#   ~/.config/treevee/treevee.toml (planner/editor sections)

# ── LLM ──────────────────────────────────────────────────────────
llm_retries = 3             # Retry LLM query on failure (default: 3)
llm_retry_base_delay = 3.0  # Base delay (s) for exponential backoff (default: 3.0)

# ── Search ───────────────────────────────────────────────────────
eval_cmd = "pixi run python eval.py"  # Evaluation command to run
optim_mode = "min"                     # Optimization direction: "max" or "min" (default: "min")
max_iters = 50                         # Maximum number of iterations (default: 50)
time_limit = 0                         # Wall-clock time limit in seconds, 0 = no limit
patience = 10                          # Stagnation threshold per branch (default: 10)
eval_timeout = 300                     # Timeout per evaluation run in seconds (default: 300)
max_children = 10                      # Maximum child expansions per node (default: 10)
decay_exploration = true               # Enable progressive UCT exploration decay (default: true)

# ── Fusion ───────────────────────────────────────────────────────
use_fusion = true         # Enable cross-branch fusion agent (default: true)
fusion_min_iters = 10     # Minimum iterations before fusion is allowed (default: 10)
fusion_prob = 0.5         # Probability of using fusion after min iters (default: 0.5)

# ── Sandboxing ───────────────────────────────────────────────────
sandbox = true             # Run eval inside the platform-native sandbox (default: true)
                           # Linux: bubblewrap. macOS: zerobox (Seatbelt). Windows: not supported.
allow_network = true       # Allow network access inside the sandbox (default: true)
tmpdir = "/tmp"            # Writable temp directory.
                           # Linux: bind-mounted as /tmp inside the sandbox.
                           # macOS: exposed via TMPDIR — code that hardcodes "/tmp/..." will fail unless this stays at /tmp.

# ── Misc ─────────────────────────────────────────────────────────
verbose = false  # Print LLM agent output in real-time (default: false)

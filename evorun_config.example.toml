# Example ~/.config/evorun/evorun.toml
# Copy to ~/.config/evorun/evorun.toml and adjust as needed.
# This config controls the planner and editor LLM models/providers.
#
# api_key: omit or set to "unset" to use the env var.
#          Otherwise sets ANTHROPIC_API_KEY (even for the anthropic provider).

[planner]
model = "claude-opus-4-5"
provider = "anthropic"
api_key = "unset"

[editor]
model = "claude-sonnet-4-6"
provider = "anthropic"
api_key = "unset"
